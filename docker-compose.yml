# Docker Compose unifie — instancier avec des .env differents :
#
# DEV / CI mono-host (3 nœuds sur la meme machine, ports differencies) :
#   docker compose --env-file .env.node1 -p node1 up --build -d
#   docker compose --env-file .env.node2 -p node2 up --build -d
#   docker compose --env-file .env.node3 -p node3 up --build -d
#
# PROD cross-machine (1 nœud par machine, peers via Wireguard 10.99.0.x) :
#   sur onsite-1 : docker compose --env-file .env.prod.node1 -p node1 up -d
#   sur onsite-2 : docker compose --env-file .env.prod.node2 -p node2 up -d
#   sur NODE3    : docker compose --env-file .env.prod.node3 -p node3 up -d
#
# Bascule controlee par la variable ADVERTISE_HOST :
# - non definie (CI/dev) : les services s'annoncent sur "host.docker.internal"
#   resolu localement vers la gateway Docker -> tous les containers d'1 host
#   se voient via les ports differencies (2380/2382/2384).
# - definie (prod, ex: "10.99.0.2") : les services s'annoncent sur l'IP
#   Wireguard du nœud -> les peers etcd des autres machines reachent via
#   le mesh WG vers <wg-ip>:2380. Cf docs/PROVISIONING_ONSITE.md §22bis.

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    # Auto-recovery au boot/reboot : etcd reforme le quorum sans intervention.
    # `unless-stopped` respecte un `docker compose stop` explicite (tests failover
    # tier3/tier4) → le conteneur reste down quand on l'arrete volontairement.
    restart: unless-stopped
    # extra_hosts : sur Linux (CI/VM), Docker Desktop n'existe pas → host.docker.internal
    # n'est pas resolu par defaut. host-gateway (Docker 20.10+) le resoud vers l'IP du
    # host. Sur Docker Desktop Windows, host.docker.internal est natif → cette ligne est
    # ignoree (pas de regression).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${ETCD_CLIENT_PORT}:2379"
      - "${ETCD_PEER_PORT}:2380"
    environment:
      ETCD_NAME: ${NODE_NAME}
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://${ADVERTISE_HOST:-host.docker.internal}:${ETCD_CLIENT_PORT}
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://${ADVERTISE_HOST:-host.docker.internal}:${ETCD_PEER_PORT}
      ETCD_INITIAL_CLUSTER: ${ETCD_INITIAL_CLUSTER}
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: alarm-ha-cluster
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  patroni:
    # `image:` + `build:` cohabitent volontairement :
    # - En DEV/CI (`docker compose up --build -d`) : `--build` force le build local et
    #   tag avec `image:` -> on travaille sur le code courant du clone.
    # - En PROD (`scripts/start-prod-node.sh --pull` + `docker compose up -d` sans
    #   --build) : compose utilise l'image deja pullee localement par le timer
    #   systemd (cf infra/onsite/systemd/alarm-cd-pull.*, PR 3 du plan §8).
    # Cf docs/CD_DESIGN.md §1 (Build) et Q-X2 (coexistence build local vs registry).
    image: ${REGISTRY:-ghcr.io/claude-murgat}/alarm-patroni:${IMAGE_TAG:-stable}
    # Auto-recovery au boot/reboot : Patroni rejoint le cluster sans intervention
    # (sinon, apres reboot, le conteneur reste `Exited` — il fallait `docker start`
    # a la main). `unless-stopped` respecte le `docker compose stop` des tests failover.
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.patroni
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PG_PORT}:5432"
      - "${PATRONI_PORT}:8008"
    environment:
      PATRONI_NAME: ${NODE_NAME}
      PATRONI_ETCD3_HOSTS: ${ETCD_HOSTS}
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: ${ADVERTISE_HOST:-host.docker.internal}:${PG_PORT}
      PATRONI_RESTAPI_CONNECT_ADDRESS: ${ADVERTISE_HOST:-host.docker.internal}:${PATRONI_PORT}
    volumes:
      - pg_data:/var/lib/postgresql/data
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      # Tuning chantier #21 step 1 : interval 10s -> 5s.
      #
      # start_period: 60s + retries: 18 (chantier #21 step 4, smoke-tested
      # 2026-05-06 contre boot 3-noeuds reel).
      #
      # Rationale : un noeud replica patroni fait pg_basebackup au boot
      # (clone le primaire, ~10-30s selon le volume + I/O). Pendant ce
      # temps, le `/health` patroni renvoie 503 ("creating replica" /
      # "starting"). Le boot d'un cluster 3-noeuds (tier4 nightly,
      # cf .github/workflows/tier4-failback.yml) a 2 replicas a faire
      # basebackup en sequence -> on a besoin d'une fenetre tolerant
      # le 503 pendant tout pg_basebackup + post_bootstrap + premier tick
      # patroni.
      #
      # start_period 60s : pendant les 60 premieres secondes, les checks
      # qui echouent ne sont PAS comptes contre retries (semantique
      # Docker). Premier check qui passe -> end of start_period.
      # retries 18 (× interval 5s = 90s) : apres start_period ou apres
      # premier check OK, on tolere 90s consecutifs de 503 avant de
      # marquer unhealthy. En regime etabli, chaque check est < 1s, donc
      # 18 retries n'a aucun cout perceptible — c'est juste une marge.
      #
      # Sans cette marge, `docker compose up -d` (tier4) fait abort le
      # `depends_on: condition: service_healthy` du backend pendant le
      # pg_basebackup d'un replica -> "dependency failed".
      start_period: 60s
      test: ["CMD", "curl", "-sf", "http://localhost:8008/health"]
      interval: 5s
      timeout: 5s
      retries: 18

  backend:
    # Idem patroni : image: pour pull en prod, build: pour dev/CI. Cf bloc patroni
    # ci-dessus pour le rationale complet.
    image: ${REGISTRY:-ghcr.io/claude-murgat}/alarm-backend:${IMAGE_TAG:-stable}
    build: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:${BACKEND_PORT}:8000"
    environment:
      - DATABASE_URL=postgresql://alarm:alarm_secret@patroni:5432/alarm_db
      - PATRONI_URL=http://patroni:8008
      # SECRET_KEY : signe les JWT (auth.py). NE PLUS hardcoder ici (compromise = forgery
      # à distance via /api/auth/login). Source par layers :
      #   - PROD : .env.prod.secrets (gitignored, déposé à la main sur chaque machine,
      #            cf docs/PROVISIONING_ONSITE.md), sourcé par scripts/start-prod-node.sh
      #   - CI/dev : .env.node{1,2,3} et .env.dev (publics ; valeurs distinctes des
      #              defaults de auth.py pour que secret_key_default=false en CI)
      # Le `:?` fait échouer compose si SECRET_KEY n'est pas définie (fail-fast).
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY missing — set via .env.prod.secrets (PROD) or .env.{dev,node1,node2,node3} (CI)}
      # SMTP : overridable via env files (cf issue #105). En dev/CI les defaults
      # pointent vers MailHog local (profile mailhog). En PROD, les valeurs viennent
      # de .env.prod.node{1,2,3} (HOST/PORT/FROM) + .env.prod.secrets (USER/PASS).
      # Si SMTP_HOST vide → email_service skip silencieusement, pas de blocage event loop.
      - SMTP_HOST=${SMTP_HOST-host.docker.internal}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_FROM=${SMTP_FROM:-alarmes@alarm.local}
      - SMTP_USER=${SMTP_USER-}
      - SMTP_PASS=${SMTP_PASS-}
      - SMTP_TIMEOUT=${SMTP_TIMEOUT:-10}
      - PEER_TEST_URLS=${PEER_TEST_URLS}
      # INV-043 (révisé 2026-06-17) : défaut true → un replica forwarde le
      # heartbeat au leader (via WG) au lieu de 503, sur TOUS les nœuds. Permet
      # à n'importe quel nœud edge externe de servir un téléphone même quand il
      # est replica (résilience si le cloud tombe). false = kill-switch (ancien
      # 503 + rotation app). En dev/CI single-node, le nœud est leader → sans effet.
      - HEARTBEAT_PROXY_ON_REPLICA=${HEARTBEAT_PROXY_ON_REPLICA:-true}
      # INV-044 (2026-06-17) : défaut true → un replica forwarde les écritures
      # /api/* (login, config, users…) au leader via WG au lieu d'échouer en
      # read-only. Permet à l'UI web servie par un nœud replica (ex: cloud OVH,
      # seul joignable publiquement) de fonctionner quel que soit le primary →
      # le leader Patroni peut rester sur un onsite. false = kill-switch (ancien
      # comportement, écriture locale → 500 read-only). Dev/CI single-node :
      # le nœud est leader → sans effet. Généralise INV-043 (heartbeat).
      - WRITE_PROXY_ON_REPLICA=${WRITE_PROXY_ON_REPLICA:-true}
      - NODE_NAME=${NODE_NAME}
      - GATEWAY_KEY=${GATEWAY_KEY:-changeme-in-prod}
      # INV-076 : safe-by-default false. Dev/CI override explicite via les
      # .env dedies (.env.dev, .env.node[1-3], .env.ci-w[12]). Les .env.prod.*
      # NE doivent PAS surcharger -> /test/* refuse en prod. Cf tests/INVARIANTS.md.
      - ENABLE_TEST_ENDPOINTS=${ENABLE_TEST_ENDPOINTS:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000,http://localhost:8001,http://localhost:8002}
      - FCM_SERVICE_ACCOUNT_JSON=/app/firebase-service-account.json
      - FCM_ESCALATION_DELAY_MINUTES=${FCM_ESCALATION_DELAY_MINUTES:-2}
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      patroni:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Mailhog : seulement sur le noeud qui a MAILHOG_SMTP_PORT != 0
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-0}:1025"
      - "${MAILHOG_WEB_PORT:-0}:8025"
    profiles:
      - mailhog

volumes:
  etcd_data:
  pg_data:
