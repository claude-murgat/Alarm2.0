services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: alarm
      POSTGRES_PASSWORD: alarm_secret
      POSTGRES_DB: alarm_db
    # Activer le WAL streaming pour la réplication vers le standby VPS2
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c hot_standby=on
      -c wal_keep_size=64
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Script d'init : crée l'utilisateur replicator + entrée pg_hba.conf
      # N'est exécuté QU'UNE SEULE FOIS (premier démarrage avec volume vide).
      # Si la DB existe déjà : docker compose down -v && docker compose up --build -d
      - ./postgres/primary_init.sh:/docker-entrypoint-initdb.d/01_replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alarm -d alarm_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      alarm_net:
        aliases:
          - db      # alias visible de tous les projets sur alarm_shared_net

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI + API
    restart: unless-stopped
    networks:
      alarm_net:
        aliases:
          - mailhog  # alias visible de tous les projets sur alarm_shared_net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=alarm-secret-key-change-in-prod
      - DATABASE_URL=postgresql://alarm:alarm_secret@db:5432/alarm_db
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=alarmes@alarm.local
      - GATEWAY_KEY=${GATEWAY_KEY:-changeme-in-prod}
      # URL du nœud pair — permet aux endpoints de test de broadcaster
      # advance-clock/reset-clock/simulate-*/reset vers VPS2 (best-effort).
      # Utilise le nom de container Docker sur alarm_shared_net.
      - PEER_TEST_URL=http://alarm-vps2-backend-1:8000
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - alarm_net

networks:
  alarm_net:
    name: alarm_shared_net

volumes:
  pgdata:
