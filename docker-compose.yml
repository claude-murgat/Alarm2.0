# Docker Compose unifie — instancier avec des .env differents :
#   docker compose --env-file .env.node1 -p node1 up --build -d
#   docker compose --env-file .env.node2 -p node2 up --build -d
#   docker compose --env-file .env.node3 -p node3 up --build -d

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    ports:
      - "${ETCD_CLIENT_PORT}:2379"
      - "${ETCD_PEER_PORT}:2380"
    environment:
      ETCD_NAME: ${NODE_NAME}
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://host.docker.internal:${ETCD_CLIENT_PORT}
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://host.docker.internal:${ETCD_PEER_PORT}
      ETCD_INITIAL_CLUSTER: ${ETCD_INITIAL_CLUSTER}
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: alarm-ha-cluster
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  patroni:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    ports:
      - "${PG_PORT}:5432"
      - "${PATRONI_PORT}:8008"
    environment:
      PATRONI_NAME: ${NODE_NAME}
      PATRONI_ETCD3_HOSTS: ${ETCD_HOSTS}
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: host.docker.internal:${PG_PORT}
      PATRONI_RESTAPI_CONNECT_ADDRESS: host.docker.internal:${PATRONI_PORT}
    volumes:
      - pg_data:/var/lib/postgresql/data
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "0.0.0.0:${BACKEND_PORT}:8000"
    environment:
      - DATABASE_URL=postgresql://alarm:alarm_secret@patroni:5432/alarm_db
      - PATRONI_URL=http://patroni:8008
      - SECRET_KEY=alarm-secret-key
      - SMTP_HOST=host.docker.internal
      - SMTP_PORT=1025
      - SMTP_FROM=alarmes@alarm.local
      - PEER_TEST_URLS=${PEER_TEST_URLS}
      - NODE_NAME=${NODE_NAME}
      - GATEWAY_KEY=${GATEWAY_KEY:-changeme-in-prod}
      - ENABLE_TEST_ENDPOINTS=${ENABLE_TEST_ENDPOINTS:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000,http://localhost:8001,http://localhost:8002}
      - FCM_SERVICE_ACCOUNT_JSON=/app/firebase-service-account.json
      - FCM_ESCALATION_DELAY_MINUTES=${FCM_ESCALATION_DELAY_MINUTES:-2}
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      patroni:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Mailhog : seulement sur le noeud qui a MAILHOG_SMTP_PORT != 0
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-0}:1025"
      - "${MAILHOG_WEB_PORT:-0}:8025"
    profiles:
      - mailhog

volumes:
  etcd_data:
  pg_data:
