services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: alarm
      POSTGRES_PASSWORD: alarm_secret
      POSTGRES_DB: alarm_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alarm -d alarm_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      alarm_net:
        aliases:
          - db      # alias visible de tous les projets sur alarm_shared_net

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI + API
    restart: unless-stopped
    networks:
      alarm_net:
        aliases:
          - mailhog  # alias visible de tous les projets sur alarm_shared_net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=alarm-secret-key-change-in-prod
      - DATABASE_URL=postgresql://alarm:alarm_secret@db:5432/alarm_db
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=alarmes@alarm.local
      - GATEWAY_KEY=${GATEWAY_KEY:-changeme-in-prod}
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - alarm_net

networks:
  alarm_net:
    name: alarm_shared_net

volumes:
  pgdata:
