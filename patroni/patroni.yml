scope: alarm-cluster

# name, restapi, etcd3, postgresql connect_address sont overrides
# par les variables d'env PATRONI_* passees par Docker Compose.

restapi:
  listen: 0.0.0.0:8008

etcd3:
  hosts: localhost:2379

bootstrap:
  dcs:
    # Tuning chantier #21 step 1 (ha-expert recommendation, 2026-04-25) :
    # - ttl 30 -> 20 : leader fail-detected en 20s au lieu de 30s (10-15s gain
    #   sur failover). Plancher de 10s a NE PAS franchir (volatilite reseau VPS).
    # - loop_wait 10 -> 8 : control loop tick 20% plus rapide (2-3s gain).
    # - retry_timeout 10 -> 7 : DCS write retry plus tight (1-2s gain).
    # IMPORTANT prod : ce patroni.yml ne s'applique qu'au bootstrap initial du
    # cluster. Pour propager sur un cluster deja deploye, faire :
    #   docker compose exec patroni patronictl edit-config alarm-cluster
    # (puis modifier ttl/loop_wait/retry_timeout dans l'editeur).
    ttl: 20
    loop_wait: 8
    retry_timeout: 7
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 5
        max_replication_slots: 5
        wal_keep_size: 64MB

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host replication replicator 0.0.0.0/0 md5
    - host all all 0.0.0.0/0 md5

  post_bootstrap: /etc/patroni/post_bootstrap.sh

postgresql:
  listen: 0.0.0.0:5432
  data_dir: /var/lib/postgresql/data/patroni
  pgpass: /tmp/pgpass
  authentication:
    superuser:
      username: postgres
      password: postgres_secret
    replication:
      username: replicator
      password: rep_secret
  parameters:
    unix_socket_directories: /tmp
