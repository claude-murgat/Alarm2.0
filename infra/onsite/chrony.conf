# /etc/chrony/chrony.conf — Alarme Murgat onsite
# Cf. docs/PROVISIONING_ONSITE.md §7

# Sources NTP (4 par pool, sources françaises + Debian)
pool 2.fr.pool.ntp.org iburst maxsources 4
pool 2.debian.pool.ntp.org iburst maxsources 4

# Saut autorisé au démarrage si offset > 1s sur les 3 premières mesures
makestep 1.0 3

# Synchronise l'horloge matérielle régulièrement
rtcsync

# Driftfile pour conserver la dérive entre reboots
driftfile /var/lib/chrony/drift

# Logs minimaux (sans tracking detaillé)
logdir /var/log/chrony

# Active le service NTP serveur sur l'interface Wireguard uniquement (pas exposé)
# bindaddress 10.99.0.3   # à activer après Wireguard up
