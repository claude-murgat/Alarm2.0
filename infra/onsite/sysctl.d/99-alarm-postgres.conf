# /etc/sysctl.d/99-alarm-postgres.conf — Alarme Murgat onsite
# Cf. docs/PROVISIONING_ONSITE.md §9
# Tuning Postgres + cluster Patroni. Adapté à 4 Go RAM.

# Postgres déteste le swap. swappiness=1 force le kernel à n'y recourir qu'en dernier recours.
# (0 expose à l'OOM killer ; 1 garde le filet de secours)
vm.swappiness = 1

# Pas d'overcommit aveugle (utile pour Postgres qui pré-alloue de la mémoire)
vm.overcommit_memory = 2
vm.overcommit_ratio = 80

# Lisser les écritures Postgres (évite les pics I/O sur SATA SSD)
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10

# Augmente la backlog des connexions TCP entrantes (Patroni REST API + backend FastAPI)
net.core.somaxconn = 1024

# Garde les valeurs raisonnables pour le réseau Wireguard
net.ipv4.tcp_max_syn_backlog = 1024
