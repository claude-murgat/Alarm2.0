# CD Promote Stable — promotion AUTOMATIQUE d'une image :sha-<short> vers :stable.
#
# Cf docs/CD_DESIGN.md §2 (Promotion). Trigger : automatique au passage CI verte
# sur master. Philosophie "tout ce qui a passé CI est safe pour prod" : le canary
# auto + soak 10 min + rollback auto (cf §4-5 doc) absorbent le residual risk.
# Le gate manuel V1.0 (workflow_dispatch + input PROMOTE) avait du sens quand
# canary était lui-même manuel ; il devient redondant depuis V1.5 (PR #126).
#
# Sequence :
#   1. Triggered par `workflow_run: ["CI"]` quand CI termine sur master avec success.
#   2. Verifs prerequis (sha sur master, pas de revert recent, CD Build + CD Install
#      Smoke verts aussi, images :sha-<short> existent sur GHCR).
#   3. Re-tag GHCR via `docker buildx imagetools create` (atomique cote registry,
#      pas de rebuild, pas de pull/push de blobs).
#   4. POST kind=manual_override actor=github-actions:auto-promote dans
#      deployment_events (via API + gateway key, si configuré).
#   5. Step summary lisible.
#
# Apres ce workflow, le timer pull sur les 3 noeuds (PR 3) detectera le nouveau
# digest distant dans les 5 min et fera le pull. L'orchestrateur (PR 9, V1.5)
# lance auto le canary 3 -> 2 -> 1 dans les 15 min suivants.
#
# Securite (garde provenance) : §2 du doc dit "tout merger sur master peut
# promouvoir". Le bot IA `alarm-murgat-bot[bot]` ne merge JAMAIS sans `ai:approved`
# humain pose au prealable (cf ai-merge.yml) — mais c'est LUI qui effectue le merge
# auto, donc il est l'`actor` de TOUTES les PR auto-mergees (humaines incluses).
# L'ancien check `actor != bot` (exit 1) etait donc un faux positif qui bloquait
# 100 % des promos depuis que l'auto-merge est la norme (cf bug : aucune promo
# :stable depuis 2026-06-12). On verifie desormais la VRAIE invariante :
#   - actor humain (non-bot)  -> sanctionne d'office (§2)               -> promo
#   - actor = bot + PR du sha porte `ai:approved` -> sanction humaine   -> promo
#   - actor = bot SANS `ai:approved` (regle merge future cassee)        -> bloque
# La defense en profondeur (cf §7 doc - frontiere de blast-radius) est conservee :
# du code bot non revu ne peut toujours pas atteindre :stable.

name: CD Promote Stable

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

# Concurrency : serialise les promotes pour eviter race conditions sur le retag GHCR.
# `cancel-in-progress: false` car on veut promouvoir CHAQUE sha qui passe CI (pas
# uniquement le dernier — sinon on saute des etats intermediaires).
concurrency:
  group: cd-promote-stable
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: claude-murgat

jobs:
  promote:
    name: Auto-promote ${{ github.event.workflow_run.head_sha }} to :stable
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Filtre : on ne promeut que si CI verte ET branche master (workflow_run
    # peut declencher sur d'autres branches si le workflow CI tourne ailleurs).
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master'
    permissions:
      contents: read
      packages: write
      actions: read          # pour lire les check-runs des tiers CI
      pull-requests: read    # garde provenance : lire les labels de la PR du sha
    steps:
      - name: Garde provenance — promotion sanctionnee (humain OU PR ai:approved)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          ACTOR='${{ github.event.workflow_run.actor.login }}'
          FULL='${{ github.event.workflow_run.head_sha }}'

          # Cas 1 — merger HUMAIN (non-bot). §2 (V1.6) : "tout merger sur master
          # peut promouvoir". Sanctionne d'office.
          if [[ "$ACTOR" != "alarm-murgat-bot[bot]" && "$ACTOR" != "alarm-murgat-bot" ]]; then
            echo "Actor humain ($ACTOR) — promotion autorisee."
            exit 0
          fi

          # Cas 2 — actor = bot. Le bot effectue le merge auto APRES qu'un humain a
          # pose 'ai:approved' (cf ai-merge.yml). actor=bot n'implique donc PAS
          # "non revu" : l'ancien check actor!=bot bloquait a tort toutes les PR
          # auto-mergees. On verifie la provenance reelle : la PR associee au sha
          # doit porter 'ai:approved' (preuve de sanction humaine). Defense en
          # profondeur : un merge bot SANS 'ai:approved' (regle merge future
          # cassee) ne porterait pas le label -> promo bloquee.
          echo "Actor = bot ($ACTOR) — verification provenance 'ai:approved' sur $FULL"
          LABELS=$(gh api "/repos/${{ github.repository }}/commits/${FULL}/pulls" \
            --jq '.[].labels[].name' 2>/dev/null | sort -u || true)
          echo "Labels des PR associees au sha : ${LABELS:-<aucune>}"
          if printf '%s\n' "$LABELS" | grep -qx 'ai:approved'; then
            echo "'ai:approved' present — sanction humaine confirmee, promotion autorisee."
            exit 0
          fi
          echo "::error::Merge bot sans 'ai:approved' sur ce sha (provenance non sanctionnee) — promo :stable bloquee (defense en profondeur, cf docs/CD_DESIGN.md §2)"
          exit 1

      - name: Normalize sha
        id: sha
        run: |
          RAW='${{ github.event.workflow_run.head_sha }}'
          if [[ ! "$RAW" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            echo "::error::sha must be 7-40 hex chars (got: '$RAW')"
            exit 1
          fi
          SHORT="${RAW:0:7}"
          echo "short=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "full=${RAW}" >> "$GITHUB_OUTPUT"
          echo "Short sha : $SHORT (full: $RAW)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0    # besoin de l'historique pour verif revert

      - name: Verify sha is on master
        run: |
          FULL='${{ steps.sha.outputs.full }}'
          if ! git merge-base --is-ancestor "$FULL" origin/master 2>/dev/null; then
            echo "::error::sha $FULL n'est pas ancestor de origin/master"
            exit 1
          fi
          echo "$FULL est sur master."

      - name: Verify no revert of this sha
        run: |
          SHORT='${{ steps.sha.outputs.short }}'
          # Cherche les commits qui mentionnent "Revert" + ce sha dans le message.
          REVERTS=$(git log --oneline origin/master --grep="Revert" --grep="$SHORT" --all-match || true)
          if [[ -n "$REVERTS" ]]; then
            echo "::error::sha $SHORT semble avoir ete reverte : $REVERTS"
            exit 1
          fi
          echo "Pas de revert detecte."

      - name: Verify CD Build + CD Install Smoke green on this sha
        # CI est deja verte (garanti par le trigger workflow_run). On verifie les
        # 2 autres workflows requis. Ils tournent en parallele avec CI sur push
        # master, donc generalement deja finis quand CI termine (CD Build = 30s,
        # CD Install Smoke = 1-2 min, CI = 10 min). On wait jusqu'a 5 min.
        # Tier 4 nightly est exempt (peut ne pas avoir tourne sur ce sha).
        #
        # Cas "workflow non declenche" : CD Install Smoke a des paths: filter
        # (scripts/alarm-cd-*.sh, infra/onsite/systemd/**). Si la PR ne touche
        # aucun de ces paths, le workflow ne tourne pas — on accepte comme valid
        # (= rien a verifier, pas un fail). On exige seulement que SI il a
        # tourne, il soit success.
        run: |
          FULL='${{ steps.sha.outputs.full }}'
          REQUIRED=("CD Build" "CD Install Smoke")

          for attempt in {1..30}; do
            RUNS=$(gh api "/repos/${{ github.repository }}/actions/runs?head_sha=${FULL}&per_page=100" \
              --jq '.workflow_runs[] | {name, status, conclusion}')

            ALL_DONE=1
            WAITING=""
            for w in "${REQUIRED[@]}"; do
              STATE=$(echo "$RUNS" | jq -r --arg n "$w" 'select(.name==$n) | .status' | head -1)
              # Empty STATE = workflow non declenche (paths filter) -> on accepte
              if [[ -n "$STATE" && "$STATE" != "completed" ]]; then
                ALL_DONE=0
                WAITING="$w (status: $STATE)"
                break
              fi
            done
            if (( ALL_DONE )); then
              echo "Tous les workflows requis sont soit termines, soit non declenches (paths filter)."
              break
            fi
            echo "Attente $WAITING — attempt $attempt/30 (sleep 10s)"
            sleep 10
          done

          # Check final state : si workflow a tourne, il doit etre success.
          # Si pas tourne (CONCL vide) -> accepte (paths filter intentionnel).
          FAIL=0
          for w in "${REQUIRED[@]}"; do
            CONCL=$(echo "$RUNS" | jq -r --arg n "$w" 'select(.name==$n) | .conclusion' | head -1)
            if [[ -z "$CONCL" ]]; then
              echo "  SKIPPED : $w (non declenche sur ce sha, paths filter intentionnel)"
            elif [[ "$CONCL" != "success" ]]; then
              echo "::error::$w est '$CONCL' sur $FULL"
              FAIL=1
            else
              echo "  OK : $w"
            fi
          done
          if (( FAIL )); then exit 1; fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify :sha-<short> images exist on GHCR
        run: |
          SHORT='${{ steps.sha.outputs.short }}'
          for IMG in alarm-backend alarm-patroni; do
            REF="${REGISTRY}/${IMAGE_OWNER}/${IMG}:sha-${SHORT}"
            if ! docker buildx imagetools inspect "$REF" >/dev/null 2>&1; then
              echo "::error::Image $REF absente sur GHCR (cd-build aurait du tourner et publier)"
              exit 1
            fi
            echo "  OK : $REF existe"
          done

      - name: Re-tag :stable
        run: |
          SHORT='${{ steps.sha.outputs.short }}'
          for IMG in alarm-backend alarm-patroni; do
            SRC="${REGISTRY}/${IMAGE_OWNER}/${IMG}:sha-${SHORT}"
            DST="${REGISTRY}/${IMAGE_OWNER}/${IMG}:stable"
            echo "Re-tag $SRC -> $DST"
            docker buildx imagetools create -t "$DST" "$SRC"
          done

      - name: POST auto_promote events to backend
        # V1 LIMITATION inchangee : runner ubuntu-latest GitHub-hosted n'est pas
        # dans le mesh WG. vars.CD_API_BASE vide -> step skip proprement. Les
        # events sont posés par les scripts canary depuis NODE3 ensuite (mesh WG).
        if: vars.CD_API_BASE != ''
        env:
          CD_API_BASE: ${{ vars.CD_API_BASE }}
          CD_GATEWAY_KEY: ${{ secrets.CD_GATEWAY_KEY }}
        run: |
          SHORT='${{ steps.sha.outputs.short }}'
          if [[ -z "$CD_GATEWAY_KEY" ]]; then
            echo "::warning::CD_GATEWAY_KEY secret manquant — pas de POST event (promo loggee uniquement dans GH run summary)"
            exit 0
          fi
          for IMG in alarm-backend alarm-patroni; do
            curl -fsS --max-time 15 -X POST "$CD_API_BASE/api/deployments/events" \
              -H "X-Gateway-Key: $CD_GATEWAY_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"node\": \"registry\",
                \"image\": \"$IMG\",
                \"kind\": \"manual_override\",
                \"to_digest\": \"sha-$SHORT\",
                \"status\": \"success\",
                \"actor\": \"github-actions:auto-promote\",
                \"details\": {\"workflow_run_id\": \"${{ github.run_id }}\", \"triggering_actor\": \"${{ github.event.workflow_run.actor.login }}\", \"triggering_ci_run\": \"${{ github.event.workflow_run.id }}\"}
              }" || echo "::warning::POST event for $IMG failed"
          done

      - name: Summary
        run: |
          SHORT='${{ steps.sha.outputs.short }}'
          {
            echo "## Auto-promoted to :stable"
            echo ""
            echo "- **Sha** : \`$SHORT\`"
            echo "- **Triggered by CI run** : ${{ github.event.workflow_run.html_url }}"
            echo "- **Triggering actor** : ${{ github.event.workflow_run.actor.login }}"
            echo ""
            echo "### Images re-taggees"
            echo "- \`${REGISTRY}/${IMAGE_OWNER}/alarm-backend:stable\` -> \`sha-$SHORT\`"
            echo "- \`${REGISTRY}/${IMAGE_OWNER}/alarm-patroni:stable\` -> \`sha-$SHORT\`"
            echo ""
            echo "### Etape suivante (automatique V1.5)"
            echo "- Timer pull (5 min) sur les 3 noeuds detecte le nouveau digest et pull"
            echo "- Timer orchestrate (15 min) sur NODE3 lance canary 3 -> 2 -> 1 (soak 10 min/noeud)"
            echo "- Auto-rollback (cf §5 doc) si soak rouge sur n'importe quel noeud"
            echo ""
            echo "ETA convergence complete : ~30-45 min apres ce workflow."
          } >> "$GITHUB_STEP_SUMMARY"
