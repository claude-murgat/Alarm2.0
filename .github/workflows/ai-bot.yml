# Bot IA — phase 2 : spawn agent Claude Code CLI headless.
#
# Workflow :
#   1. Trigger : workflow_dispatch manuel (phase 3 : trigger auto sur label ai:fix).
#   2. Genere un token GitHub App installation (permissions scopees).
#   3. Cree une branche ai/issue-<N>/<RUN_ID> depuis master.
#   4. Installe Claude Code CLI (npm global).
#   5. Lance claude -p (Opus 4.7) avec :
#      - system prompt = .github/ai-bot/prompt.md (regles P1-P6 + denylist soft)
#      - user prompt = body de l'issue source
#   6. Verifie qu'un diff non-vide a ete produit (abandon sinon).
#   7. Commit (auteur alarm-murgat-bot[bot]) + push + PR vers master.
#   8. Commente l'issue source avec le lien PR.
#
# Phase 3 ajoutera : denylist check strict, trigger ai:fix, compteur iterations.
# Voir docs/AI_STRATEGY.md section 1 + design notes D1-D7.

name: AI Bot

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Numero d'issue GitHub decrivant le bug"
        required: true
        type: string

concurrency:
  group: ai-bot-issue-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  agent_fix:
    name: Phase 2 — agent fix (Opus 4.7)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # Le GITHUB_TOKEN natif n'est pas utilise (on passe par le token GH App).
      contents: read

    steps:
      - name: Generate installation token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ALARM_BOT_APP_ID }}
          private-key: ${{ secrets.ALARM_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: master
          fetch-depth: 0

      - name: Configure git identity as bot
        run: |
          git config user.name "alarm-murgat-bot[bot]"
          git config user.email "3428066+alarm-murgat-bot[bot]@users.noreply.github.com"

      - name: Fetch issue content
        id: issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --json title,body,number \
            > /tmp/issue.json
          TITLE=$(jq -r .title /tmp/issue.json)
          # Body dans un fichier pour eviter les problemes d'echappement multi-lignes
          jq -r .body /tmp/issue.json > /tmp/issue-body.txt
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "Issue #${ISSUE_NUMBER}: ${TITLE}"

      - name: Setup Node.js (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Create bot branch from master
        id: branch
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          BRANCH="ai/issue-${ISSUE_NUMBER}/${RUN_ID}"
          git checkout -b "$BRANCH"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Prepare agent prompt
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          set -euo pipefail
          # Agent input : bug context. System prompt (regles P1-P6) injecte
          # separement via --append-system-prompt.
          {
            echo "Bug report a corriger (issue #${ISSUE_NUMBER}) :"
            echo ""
            echo "Title : ${ISSUE_TITLE}"
            echo ""
            echo "Body :"
            cat /tmp/issue-body.txt
            echo ""
            echo "---"
            echo ""
            echo "Suis les regles de ton system prompt. Produis un test RED qui"
            echo "REPRODUIT le bug, puis le fix GREEN minimal. Ne commit RIEN —"
            echo "le workflow s'en charge. Termine par un resume final."
          } > /tmp/agent-input.md
          echo "Agent input prepared ($(wc -l < /tmp/agent-input.md) lines)"

      - name: Run Claude Code agent
        id: agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          # Agent lance en mode headless :
          #   -p             : user prompt (issue body)
          #   --append-system-prompt : regles P1-P6 + denylist soft
          #   --model        : Opus 4.7 (choix D2)
          #   --output-format stream-json : chaque event = 1 ligne JSON
          #   --verbose      : detail tool calls (requis avec stream-json)
          #   --dangerously-skip-permissions : non-interactive CI
          #     -> compensations : denylist check (phase 3), runner ephemeral,
          #        token scope strict
          # Anti-boucle infinie : timeout-minutes du job (20) + quota tokens Max.
          # Ajouter un plafond tours/tokens sur une version ulterieure de la CLI
          # si le flag devient disponible.
          claude -p "$(cat /tmp/agent-input.md)" \
            --append-system-prompt "$(cat .github/ai-bot/prompt.md)" \
            --model claude-opus-4-7 \
            --output-format stream-json \
            --verbose \
            --dangerously-skip-permissions \
            > /tmp/agent-output.jsonl 2>&1 || AGENT_EXIT=$?

          AGENT_EXIT=${AGENT_EXIT:-0}
          echo "Agent exit code : ${AGENT_EXIT}"
          echo "Stream lines : $(wc -l < /tmp/agent-output.jsonl)"

          # Extrait le message final de l'agent (type=result)
          # pour le log + commit message.
          AGENT_SUMMARY=$(jq -rs 'map(select(.type == "result")) | last | .result // "(no summary)"' \
            /tmp/agent-output.jsonl 2>/dev/null || echo "(jq parse error)")

          # Sauve pour les steps suivants
          echo "$AGENT_SUMMARY" > /tmp/agent-summary.md
          echo "exit_code=${AGENT_EXIT}" >> "$GITHUB_OUTPUT"
          echo "=== AGENT SUMMARY ==="
          echo "$AGENT_SUMMARY"
          echo "====================="

      - name: Verify agent produced a diff
        id: diff
        run: |
          set -euo pipefail
          CHANGES=$(git status --porcelain)
          if [[ -z "$CHANGES" ]]; then
            echo "::warning::Agent produced no diff. Interpretation : abandon."
            echo "produced=false" >> "$GITHUB_OUTPUT"
          else
            echo "Agent modified the following files :"
            echo "$CHANGES"
            echo "produced=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload agent artifacts (always, for debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-bot-run-${{ github.run_id }}
          path: |
            /tmp/agent-input.md
            /tmp/agent-output.jsonl
            /tmp/agent-summary.md
            /tmp/issue-body.txt
          retention-days: 14

      - name: Abort if agent abandoned
        if: steps.diff.outputs.produced == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          SUMMARY=$(cat /tmp/agent-summary.md 2>/dev/null || echo "(no summary)")
          BODY=$(cat <<EOF
          Phase 2 : l'agent a abandonne sans produire de diff.

          **Resume final de l'agent** :

          > $SUMMARY

          Voir les artifacts du run : https://github.com/claude-murgat/Alarm2.0/actions/runs/${RUN_ID}
          EOF
          )
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          exit 1

      - name: Commit agent's changes
        if: steps.diff.outputs.produced == 'true'
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          git add -A

          # Commit message via fichier (-F) pour echapper proprement
          # les guillemets/sauts de ligne eventuels dans le resume.
          {
            echo "fix(ai-bot): issue #${ISSUE_NUMBER}"
            echo ""
            cat /tmp/agent-summary.md 2>/dev/null || echo "(no summary)"
            echo ""
            echo "Generated by alarm-murgat-bot (phase 2 POC)."
          } > /tmp/commit-msg.txt

          git commit -F /tmp/commit-msg.txt

      - name: Push branch
        if: steps.diff.outputs.produced == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail
          git push origin "$BRANCH"

      - name: Open PR
        id: pr
        if: steps.diff.outputs.produced == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          BRANCH: ${{ steps.branch.outputs.name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          SUMMARY=$(cat /tmp/agent-summary.md 2>/dev/null || echo "(no summary)")

          cat > /tmp/pr-body.md <<EOF
          Fix propose par alarm-murgat-bot (phase 2 POC) pour l'issue #${ISSUE_NUMBER}.

          <!-- AI-BOT-METADATA
          phase: 2
          iteration: 1/3
          issue: ${ISSUE_NUMBER}
          model: claude-opus-4-7
          run: ${RUN_ID}
          -->

          ## Issue source

          #${ISSUE_NUMBER} — ${ISSUE_TITLE}

          ## Resume de l'agent

          ${SUMMARY}

          ## A verifier humain

          - [ ] Le test RED ajoute reproduit bien le bug rapporte (avant le fix, il FAIL)
          - [ ] Le fix est minimal et ne modifie que le necessaire
          - [ ] Aucun fichier de la denylist modifie (cf docs/AI_STRATEGY.md)
          - [ ] Tier 1+2+3 verts
          - [ ] Le test respecte les regles P1-P6

          ## Artifacts

          Logs complets du run (stream-json, prompt, resume) :
          https://github.com/claude-murgat/Alarm2.0/actions/runs/${RUN_ID}
          EOF

          PR_URL=$(gh pr create \
            --base master \
            --head "${BRANCH}" \
            --title "fix(ai-bot): ${ISSUE_TITLE}" \
            --body-file /tmp/pr-body.md)

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "PR opened : ${PR_URL}"

      - name: Comment on source issue
        if: steps.diff.outputs.produced == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          set -euo pipefail
          gh issue comment "$ISSUE_NUMBER" \
            --body "Phase 2 : agent a produit une PR pour ce bug -> ${PR_URL}"
