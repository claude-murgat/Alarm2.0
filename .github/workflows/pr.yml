# CI Alarme Murgat — Pipeline 3 tiers complets (J8).
# Strategie : tier 1+2 sur runner cloud GitHub (gratuit), tier 3 sur self-hosted (cluster Patroni).
# Voir docs/AI_STRATEGY.md section 3.

name: CI

on:
  pull_request:
  push:
    branches: [master, "ci/**"]

# Annule les runs precedents sur la meme PR/branche → economie + pas d'empilement IA.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier1_unit:
    name: Tier 1 — Unit (logique pure)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tier 1 (unit tests)
        run: |
          mkdir -p reports
          pytest tests/unit -m unit -n auto \
            --randomly-seed=last \
            --junitxml=reports/tier1.xml \
            --cov --cov-report=xml:reports/coverage-tier1.xml \
            --cov-report=term-missing

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-reports
          path: reports/
          retention-days: 14

  tier2_integration:
    name: Tier 2 — Integration (FastAPI TestClient + SQLite)
    needs: tier1_unit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tier 2 (integration tests)
        # Pas de -n auto : les workers xdist partageraient le meme SQLite et race sur
        # le seed users (UNIQUE constraint). A reactiver avec une DB par worker quand
        # le volume justifiera la complexite.
        run: |
          mkdir -p reports
          pytest tests/integration -m integration \
            --randomly-seed=last \
            --junitxml=reports/tier2.xml

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-reports
          path: reports/
          retention-days: 14

  tier3_e2e:
    name: Tier 3 — E2E cluster (worker ${{ matrix.worker }}/2)
    needs: tier2_integration
    runs-on: [self-hosted, linux, docker, alarm-ci]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2]
    env:
      PROJECT: ci-w${{ matrix.worker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt

      - name: Install pytest deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt requests pyjwt

      - name: Compute backend URL
        run: |
          # host.docker.internal : depuis le runner conteneurise, les conteneurs des
          # tests tournent sur le host (DooD), pas sur le runner lui-meme.
          case "${{ matrix.worker }}" in
            1) PORT=18000 ;;
            2) PORT=28000 ;;
          esac
          echo "BACKEND_URL=http://host.docker.internal:$PORT" >> $GITHUB_ENV

      - name: Pre-cleanup (au cas ou un run precedent a echoue)
        run: ./scripts/ci-cleanup.sh "$PROJECT" || true

      - name: Provide dummy firebase service account
        # Le compose mount backend/firebase-service-account.json. En CI on n'a pas
        # de vraies creds FCM — on cree un fichier vide pour ne pas bloquer le mount.
        run: |
          [[ -f backend/firebase-service-account.json ]] || echo '{}' > backend/firebase-service-account.json

      - name: Boot cluster (compose up)
        run: |
          docker compose --env-file ".env.ci-w${{ matrix.worker }}" -p "$PROJECT" up -d --build

      - name: Wait for cluster ready
        run: ./scripts/ci-wait-cluster.sh "$PROJECT" 180

      - name: Run tier 3 (e2e tests, split ${{ matrix.worker }}/2)
        # Iteration 1 : on limite a tests/test_e2e.py (le coeur, 119 tests).
        # Les autres (test_improvements, test_user_modes, test_fcm, etc.)
        # seront ajoutes apres validation green sur ce fichier.
        # Pas de --splits pour cette premiere passe : worker 1 = pas-failover,
        # worker 2 = au repos (sera utilise quand on activera --splits).
        run: |
          mkdir -p reports
          if [[ "${{ matrix.worker }}" == "1" ]]; then
            pytest tests/test_e2e.py \
              --skip-failover \
              -p no:randomly \
              --junitxml=reports/tier3-w${{ matrix.worker }}.xml
          else
            echo "Worker 2 desactive temporairement (J8 iteration 1, voir commit msg)."
            mkdir -p reports && echo '<testsuite tests="0"/>' > reports/tier3-w2.xml
          fi

      - name: Upload compose logs (always)
        if: always()
        run: |
          docker compose -p "$PROJECT" logs --no-color > reports/compose-w${{ matrix.worker }}.log 2>&1 || true

      - name: Cleanup cluster
        if: always()
        run: ./scripts/ci-cleanup.sh "$PROJECT"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier3-w${{ matrix.worker }}-reports
          path: reports/
          retention-days: 14
